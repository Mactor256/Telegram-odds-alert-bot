services:

  bot:

    build: .

    env_file:
      - .env

    depends_on:
      - db


  db:

    image:
      postgres:16

    environment:

      POSTGRES_USER:
        postgres

      POSTGRES_PASSWORD:
        password

      POSTGRES_DB:
        oddsbot


    volumes:

      - postgres_data:/var/lib/postgresql/data



volumes:

  postgres_data:
